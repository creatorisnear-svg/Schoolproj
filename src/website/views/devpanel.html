<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPM Developer Panel</title>
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; }
    header { background: #111; border-bottom: 1px solid #222; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
    header img { height: 32px; }
    header span { font-size: 18px; font-weight: 700; color: #fff; }
    header .user-info { margin-left: auto; font-size: 13px; color: #888; }
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 32px; border-bottom: 1px solid #222; padding-bottom: 0; }
    .tab { padding: 10px 20px; border: none; background: none; color: #888; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; font-family: inherit; }
    .tab.active { color: #fff; border-bottom-color: #5865f2; }
    .tab:hover:not(.active) { color: #ccc; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card { background: #161616; border: 1px solid #222; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-title { font-size: 15px; font-weight: 700; color: #fff; }
    .card-meta { font-size: 12px; color: #666; margin-top: 4px; }
    .card-content { font-size: 13px; color: #aaa; line-height: 1.6; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge-info { background: #1a2a4a; color: #5b9cf6; }
    .badge-update { background: #1a3a2a; color: #4ade80; }
    .badge-warning { background: #3a2a1a; color: #f59e0b; }
    .btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #5865f2; color: #fff; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-ghost { background: #222; color: #ccc; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #ccc; margin-bottom: 6px; }
    input, textarea, select { width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; color: #e0e0e0; font-size: 13px; padding: 10px 12px; font-family: inherit; outline: none; transition: border-color .15s; }
    input:focus, textarea:focus, select:focus { border-color: #5865f2; }
    textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .add-form { background: #111; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; margin-bottom: 28px; }
    .add-form h3 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 18px; }
    .section-label { font-size: 13px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }
    .empty { text-align: center; color: #555; padding: 40px 0; font-size: 14px; }
    .changes-list { list-style: none; margin-top: 8px; }
    .changes-list li { font-size: 13px; color: #aaa; padding: 3px 0 3px 14px; position: relative; }
    .changes-list li::before { content: '•'; position: absolute; left: 0; color: #5865f2; }
    .tag-inactive { opacity: 0.4; }
    .actions { display: flex; gap: 8px; }
    .toggle-btn { background: #1a2a1a; color: #4ade80; border: none; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .toggle-btn.off { background: #2a1a1a; color: #888; }
    .video-thumb { width: 100%; border-radius: 8px; margin-top: 10px; background: #111; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; color: #555; font-size: 13px; overflow: hidden; }
    .video-thumb iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    .alert-success { background: #1a3a2a; color: #4ade80; }
    .alert-error { background: #3a1a1a; color: #ef4444; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } header { padding: 12px 16px; } .container { padding: 24px 16px; } }
  </style>
</head>
<body>

<header>
  <img src="/img/logo.png" alt="RPM">
  <span>Developer Panel</span>
  <div class="user-info" id="user-info">Developer Panel</div>
  <a href="/dev/logout" style="margin-left:16px;font-size:13px;color:#888;text-decoration:none;padding:6px 14px;border:1px solid #333;border-radius:8px;">Sign Out</a>
</header>

<div class="container">

  <div id="alert-box" style="display:none;"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('announcements')">Announcements</button>
    <button class="tab" onclick="switchTab('changelogs')">Changelogs</button>
    <button class="tab" onclick="switchTab('videos')">Preview Videos</button>
  </div>

  <div id="panel-announcements" class="panel active">
    <div class="add-form">
      <h3>New Announcement</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="ann-title" placeholder="e.g. Scheduled Maintenance">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="ann-type">
            <option value="info">Info</option>
            <option value="update">Update</option>
            <option value="warning">Warning</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Content</label>
        <textarea id="ann-content" placeholder="Announcement message..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="createAnnouncement()">Post Announcement</button>
    </div>
    <div class="section-label">Live Announcements</div>
    <div id="announcements-list"><div class="empty">Loading...</div></div>
  </div>

  <div id="panel-changelogs" class="panel">
    <div class="add-form">
      <h3>New Changelog</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Version</label>
          <input type="text" id="cl-version" placeholder="e.g. v2.4.1">
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="cl-title" placeholder="e.g. AI Dispatch Update">
        </div>
      </div>
      <div class="form-group">
        <label>Changes (one per line)</label>
        <textarea id="cl-changes" placeholder="Added hourly status reset&#10;Fixed traffic stop auto-channel&#10;Improved 10-code recognition"></textarea>
      </div>
      <button class="btn btn-primary" onclick="createChangelog()">Post Changelog</button>
    </div>
    <div class="section-label">Changelog History</div>
    <div id="changelogs-list"><div class="empty">Loading...</div></div>
  </div>

  <div id="panel-videos" class="panel">
    <div class="add-form">
      <h3>Add Preview Video</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="vid-title" placeholder="e.g. AI Dispatch Demo">
        </div>
        <div class="form-group">
          <label>Display Order</label>
          <input type="number" id="vid-order" placeholder="0" value="0">
        </div>
      </div>
      <div class="form-group">
        <label>YouTube URL or Embed URL</label>
        <input type="text" id="vid-url" placeholder="https://www.youtube.com/watch?v=...">
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <input type="text" id="vid-desc" placeholder="Short description of this video">
      </div>
      <button class="btn btn-primary" onclick="createVideo()">Add Video</button>
    </div>
    <div class="section-label">Preview Videos</div>
    <div id="videos-list"><div class="empty">Loading...</div></div>
  </div>

</div>

<script>
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      const names = ['announcements', 'changelogs', 'videos'];
      t.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
  }

  function showAlert(msg, type) {
    const box = document.getElementById('alert-box');
    box.className = 'alert alert-' + type;
    box.textContent = msg;
    box.style.display = 'block';
    setTimeout(() => box.style.display = 'none', 3000);
  }

  function toEmbedUrl(url) {
    const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
    if (match) return 'https://www.youtube.com/embed/' + match[1];
    return url;
  }

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/dev' + path, opts);
    return res.json();
  }

  async function loadAnnouncements() {
    const items = await api('GET', '/announcements');
    const el = document.getElementById('announcements-list');
    if (!items.length) { el.innerHTML = '<div class="empty">No announcements yet.</div>'; return; }
    el.innerHTML = items.map(a => `
      <div class="card ${a.active ? '' : 'tag-inactive'}">
        <div class="card-header">
          <div>
            <div class="card-title">${esc(a.title)} <span class="badge badge-${a.type}">${a.type}</span></div>
            <div class="card-meta">${new Date(a.createdAt).toLocaleDateString()} &middot; by ${esc(a.createdBy || 'unknown')}</div>
          </div>
          <div class="actions">
            <button class="toggle-btn ${a.active ? '' : 'off'}" onclick="toggleAnnouncement('${a._id}', ${!a.active})">${a.active ? 'Active' : 'Hidden'}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem('announcements', '${a._id}', loadAnnouncements)">Delete</button>
          </div>
        </div>
        <div class="card-content">${esc(a.content)}</div>
      </div>
    `).join('');
  }

  async function createAnnouncement() {
    const title = document.getElementById('ann-title').value.trim();
    const content = document.getElementById('ann-content').value.trim();
    const type = document.getElementById('ann-type').value;
    if (!title || !content) { showAlert('Title and content are required.', 'error'); return; }
    await api('POST', '/announcements', { title, content, type });
    document.getElementById('ann-title').value = '';
    document.getElementById('ann-content').value = '';
    showAlert('Announcement posted!', 'success');
    loadAnnouncements();
  }

  async function toggleAnnouncement(id, active) {
    await api('PATCH', '/announcements/' + id, { active });
    loadAnnouncements();
  }

  async function loadChangelogs() {
    const items = await api('GET', '/changelogs');
    const el = document.getElementById('changelogs-list');
    if (!items.length) { el.innerHTML = '<div class="empty">No changelogs yet.</div>'; return; }
    el.innerHTML = items.map(c => `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${esc(c.version)} &mdash; ${esc(c.title)}</div>
            <div class="card-meta">${new Date(c.date).toLocaleDateString()} &middot; by ${esc(c.createdBy || 'unknown')}</div>
          </div>
          <div class="actions">
            <button class="btn btn-danger btn-sm" onclick="deleteItem('changelogs', '${c._id}', loadChangelogs)">Delete</button>
          </div>
        </div>
        <ul class="changes-list">${(c.changes || []).map(ch => `<li>${esc(ch)}</li>`).join('')}</ul>
      </div>
    `).join('');
  }

  async function createChangelog() {
    const version = document.getElementById('cl-version').value.trim();
    const title = document.getElementById('cl-title').value.trim();
    const changesRaw = document.getElementById('cl-changes').value.trim();
    if (!version || !title) { showAlert('Version and title are required.', 'error'); return; }
    const changes = changesRaw.split('\n').map(s => s.trim()).filter(Boolean);
    await api('POST', '/changelogs', { version, title, changes });
    document.getElementById('cl-version').value = '';
    document.getElementById('cl-title').value = '';
    document.getElementById('cl-changes').value = '';
    showAlert('Changelog posted!', 'success');
    loadChangelogs();
  }

  async function loadVideos() {
    const items = await api('GET', '/videos');
    const el = document.getElementById('videos-list');
    if (!items.length) { el.innerHTML = '<div class="empty">No preview videos yet.</div>'; return; }
    el.innerHTML = items.map(v => `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${esc(v.title)}</div>
            <div class="card-meta">Order: ${v.order} &middot; ${esc(v.description || '')}</div>
          </div>
          <div class="actions">
            <button class="btn btn-danger btn-sm" onclick="deleteItem('videos', '${v._id}', loadVideos)">Delete</button>
          </div>
        </div>
        <div class="video-thumb">
          <iframe src="${toEmbedUrl(esc(v.videoUrl))}" allowfullscreen></iframe>
        </div>
      </div>
    `).join('');
  }

  async function createVideo() {
    const title = document.getElementById('vid-title').value.trim();
    const videoUrl = document.getElementById('vid-url').value.trim();
    const description = document.getElementById('vid-desc').value.trim();
    const order = parseInt(document.getElementById('vid-order').value) || 0;
    if (!title || !videoUrl) { showAlert('Title and video URL are required.', 'error'); return; }
    await api('POST', '/videos', { title, videoUrl, description, order });
    document.getElementById('vid-title').value = '';
    document.getElementById('vid-url').value = '';
    document.getElementById('vid-desc').value = '';
    document.getElementById('vid-order').value = '0';
    showAlert('Video added!', 'success');
    loadVideos();
  }

  async function deleteItem(type, id, reload) {
    if (!confirm('Delete this item?')) return;
    await api('DELETE', '/' + type + '/' + id);
    showAlert('Deleted.', 'success');
    reload();
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function init() {
    const check = await fetch('/dev/check').then(r => r.json());
    if (!check.authorized) { window.location.href = '/dev/login'; return; }
    loadAnnouncements();
    loadChangelogs();
    loadVideos();
  }

  init();
</script>

</body>
</html>
