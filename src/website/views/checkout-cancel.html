<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled — RolePlayManager</title>
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .result-page { padding: 120px 0 80px; text-align: center; }
    .result-icon { width: 64px; height: 64px; background: var(--amber-bg); border: 1px solid rgba(251,191,36,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; color: var(--amber); }
    .result-page h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    .result-page p { color: var(--text-muted); font-size: 15px; max-width: 420px; margin: 0 auto 32px; line-height: 1.7; }
    .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="logo">
        <img src="/img/logo.png" alt="RPM">
        <span class="logo-text-bold">ROLEPLAY</span><span class="logo-text-light">MANAGER</span>
      </a>
    </div>
  </nav>

  <div class="result-page">
    <div class="container">
      <div class="result-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <h1>Payment cancelled</h1>
      <p>Your payment was not completed. Nothing was charged. Return to pricing whenever you're ready.</p>
      <div class="result-actions">
        <a href="/pricing" style="padding:12px 24px;font-size:14px;font-weight:600;border-radius:8px;background:#fff;color:#0a0b0e;text-decoration:none;">View Pricing</a>
        <a href="/" style="padding:12px 24px;font-size:14px;font-weight:600;border-radius:8px;background:transparent;border:1px solid #23272f;color:#7a818e;text-decoration:none;">Back to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
