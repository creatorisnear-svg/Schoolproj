<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — RolePlayManager</title>
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .result-page { padding: 120px 0 80px; text-align: center; }
    .result-icon { width: 64px; height: 64px; background: var(--green-bg); border: 1px solid var(--green-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; color: var(--green); }
    .result-page h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    .result-page p { color: var(--text-muted); font-size: 15px; max-width: 460px; margin: 0 auto 32px; line-height: 1.7; }
    .key-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; max-width: 420px; margin: 0 auto 32px; }
    .key-box .key-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
    .key-box .key-value { font-size: 18px; font-weight: 700; font-family: monospace; color: var(--text); letter-spacing: 2px; word-break: break-all; }
    .key-box .key-hint { font-size: 12px; color: var(--text-dim); margin-top: 8px; }
    .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="logo">
        <img src="/img/logo.png" alt="RPM">
        <span class="logo-text-bold">ROLEPLAY</span><span class="logo-text-light">MANAGER</span>
      </a>
    </div>
  </nav>

  <div class="result-page">
    <div class="container">
      <div class="result-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1>Payment successful</h1>
      <p>Your premium key has been generated. Activate it from the Premium section of your server's dashboard.</p>

      <div class="key-box" id="key-box" style="display:none;">
        <div class="key-label">Your Premium Key</div>
        <div class="key-value" id="key-display"></div>
        <div class="key-hint">Save this key. You can also find it in your dashboard under Premium.</div>
      </div>

      <div class="result-actions">
        <a href="/dashboard" class="btn btn-primary" style="padding:12px 24px;font-size:14px;font-weight:600;border-radius:8px;background:#fff;color:#0a0b0e;text-decoration:none;">Open Dashboard</a>
        <a href="/" class="btn btn-secondary" style="padding:12px 24px;font-size:14px;font-weight:600;border-radius:8px;background:transparent;border:1px solid #23272f;color:#7a818e;text-decoration:none;">Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var key = params.get('key');
    if (key) {
      document.getElementById('key-box').style.display = 'block';
      document.getElementById('key-display').textContent = key;
    }
  </script>
</body>
</html>
