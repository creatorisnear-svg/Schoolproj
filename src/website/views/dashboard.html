<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - RolePlayManager</title>
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="logo">
        <img src="/img/logo.png" alt="RM">
        <span class="logo-text-bold">ROLEPLAY</span><span class="logo-text-light">MANAGER</span>
      </a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li id="nav-user"></li>
      </ul>
      <div id="nav-user-mobile" style="display:flex;align-items:center;gap:8px;">
        <span id="nav-user-mobile-name" style="font-size:13px;color:var(--text-muted);display:none;"></span>
      </div>
    </div>
  </nav>

  <div id="app"></div>
  <div id="toast" class="toast"></div>

  <script src="/js/dashboard.js"></script>

</html>
